<!doctype html><html><head><meta charset="utf-8"><title>Quote card — IG square</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#2a2522; display:grid; place-items:center; min-height:100vh; }
  .frame { width: 1080px; height: 1080px; background: var(--paper); position: relative; overflow: hidden;
           font-family: var(--sans); }
  .frame::before {
    content:""; position:absolute; inset:0; pointer-events:none; mix-blend-mode: multiply; opacity: 0.9;
    background-image:
      radial-gradient(circle at 23% 19%, rgba(20,17,14,0.03) 0 1.4px, transparent 2px),
      radial-gradient(circle at 71% 63%, rgba(20,17,14,0.026) 0 1.2px, transparent 2px),
      radial-gradient(circle at 47% 88%, rgba(20,17,14,0.022) 0 1.2px, transparent 2px),
      radial-gradient(circle at 88% 32%, rgba(20,17,14,0.028) 0 1.4px, transparent 2px);
    background-size: 18px 18px, 24px 24px, 30px 30px, 22px 22px;
  }

  /* Top + bottom strips */
  .top { position:absolute; top: 0; left: 0; right: 0; height: 80px; background: var(--ink);
         display: flex; justify-content: space-between; align-items: center; padding: 0 56px; z-index: 3; color: var(--paper); }
  .top .pub { font: 500 italic 32px/1 var(--serif); }
  .top .meta { font: 500 14px/1 var(--mono); letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.7; }

  .bottom { position:absolute; bottom: 0; left: 0; right: 0; height: 100px; background: var(--paper);
            border-top: 1px solid var(--ink);
            display: flex; justify-content: space-between; align-items: center; padding: 0 56px; z-index: 3; }
  .bottom .left { display: flex; gap: 16px; align-items: center; }
  .bottom .no { font: 500 14px/1 var(--mono); letter-spacing: 0.28em; color: var(--signal); text-transform: uppercase; }
  .bottom .dash { width: 28px; height: 1px; background: var(--ink); }
  .bottom .cat { font: 500 14px/1 var(--mono); letter-spacing: 0.22em; color: var(--ink-2); text-transform: uppercase; }
  .bottom .right { font: 500 italic 22px/1 var(--serif); color: var(--ink); }

  /* Quote stage */
  .stage { position:absolute; top: 140px; bottom: 140px; left: 90px; right: 90px;
           display: grid; grid-template-rows: auto 1fr auto; gap: 32px; align-items: start; z-index: 1; }

  .glyph { font: 400 italic 220px/0.7 var(--serif); color: var(--signal); height: 80px; }
  .q     { font: 400 italic 78px/1.08 var(--serif); color: var(--ink); letter-spacing: -0.018em; max-width: 880px; align-self: center; }
  .q .hi { background: var(--signal); color: var(--paper); padding: 0 8px; }

  .attr { display: flex; gap: 18px; align-items: center; align-self: end; }
  .attr .line { width: 36px; height: 1px; background: var(--ink); }
  .attr .name { font: 500 16px/1 var(--mono); letter-spacing: 0.22em; color: var(--ink-2); text-transform: uppercase; }
  .attr .src  { font: 500 italic 26px/1 var(--serif); color: var(--ink); }
</style></head>
<body>
  <div class="frame">
    <div class="top">
      <span class="pub">Thinkers Dilemma</span>
      <span class="meta">Field note · 03</span>
    </div>

    <div class="stage">
      <div class="glyph">“</div>
      <div class="q">If the question is <span class="hi">who benefits</span>, the answer is almost never the one being asked.</div>
      <div class="attr">
        <span class="line"></span>
        <span class="src">The Watchers,</span>
        <span class="name">Issue № 014</span>
      </div>
    </div>

    <div class="bottom">
      <div class="left">
        <span class="no">№ 014</span>
        <span class="dash"></span>
        <span class="cat">Surveillance</span>
      </div>
      <span class="right">A work of inquiry.</span>
    </div>
  </div>
</body></html>
