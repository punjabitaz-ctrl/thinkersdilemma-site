<!doctype html><html><head><meta charset="utf-8"><title>TikTok cover</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#2a2522; display:grid; place-items:center; min-height:100vh; }
  .frame { width: 1080px; height: 1920px; background: var(--paper); position: relative; overflow: hidden;
           font-family: var(--sans); }
  /* paper grain */
  .frame::before {
    content:""; position:absolute; inset:0; pointer-events:none; mix-blend-mode: multiply; opacity: 0.9;
    background-image:
      radial-gradient(circle at 23% 19%, rgba(20,17,14,0.03) 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 71% 63%, rgba(20,17,14,0.025) 0 1.4px, transparent 2.2px),
      radial-gradient(circle at 47% 88%, rgba(20,17,14,0.022) 0 1.4px, transparent 2.2px),
      radial-gradient(circle at 88% 32%, rgba(20,17,14,0.028) 0 1.6px, transparent 2.2px);
    background-size: 22px 22px, 30px 30px, 36px 36px, 26px 26px;
  }

  /* TikTok safe zones: top ~150px username, right ~200px icons, bottom ~400px caption + bar.
     Center the readable content into the "safe rectangle". */
  .top { position:absolute; top: 60px; left: 60px; right: 60px;
         display: flex; justify-content: space-between; align-items: center; z-index: 2; }
  .top .pub { font: 500 italic 44px/1 var(--serif); color: var(--ink); letter-spacing: -0.01em; }
  .top .meta { font: 500 18px/1 var(--mono); letter-spacing: 0.28em; color: var(--ink-2); text-transform: uppercase; }

  /* Big stacked headline in safe zone */
  .stage { position:absolute; top: 200px; bottom: 540px; left: 80px; right: 220px;
           display: flex; flex-direction: column; justify-content: center; gap: 32px; z-index: 1; }
  .kicker { display: flex; gap: 20px; align-items: center; }
  .kicker .no { font: 500 22px/1 var(--mono); letter-spacing: 0.28em; color: var(--signal); text-transform: uppercase; }
  .kicker .dash { width: 40px; height: 2px; background: var(--ink); }
  .kicker .cat { font: 500 22px/1 var(--mono); letter-spacing: 0.22em; color: var(--ink-2); text-transform: uppercase; }

  .hl { font: 500 italic 240px/0.86 var(--serif); color: var(--ink); letter-spacing: -0.035em; }
  .hl em { color: var(--signal); font-style: italic; }
  .hl .underline { display:inline-block; border-bottom: 10px solid var(--signal); padding-bottom: 6px; }

  /* Annotation block — looks like a margin note */
  .note { display: flex; gap: 24px; align-items: flex-start; margin-top: 16px; }
  .note .arrow { color: var(--signal); font: 500 38px/1 var(--mono); }
  .note .text  { font: 400 italic 36px/1.25 var(--serif); color: var(--ink-2); max-width: 600px; }

  /* Bottom bar — same look as YouTube botstrip but vertical-suited */
  .botstrip { position:absolute; bottom: 200px; left: 60px; right: 60px;
              border-top: 4px solid var(--ink); border-bottom: 1px solid var(--ink);
              padding: 28px 0;
              display:flex; justify-content: space-between; align-items: center; z-index: 2; }
  .botstrip .left { display:flex; gap: 24px; align-items:center; }
  .botstrip .stamp svg { width: 88px; height: 88px; color: var(--ink); }
  .botstrip .name { font: 500 italic 38px/1 var(--serif); color: var(--ink); letter-spacing: -0.01em; }
  .botstrip .name .sub { font: 500 13px/1 var(--mono); letter-spacing: 0.28em; color: var(--signal); text-transform: uppercase; display:block; margin-top: 6px; font-style: normal; }
  .botstrip .ep { font: 500 28px/1 var(--mono); color: var(--ink); font-feature-settings:"tnum"; letter-spacing: 0.04em; }
  .botstrip .ep b { color: var(--signal); font-weight: 500; }

  /* Crosshair watermark behind, low-contrast */
  .crosshair { position:absolute; right: -100px; top: 280px; z-index: 0; opacity: 0.08; color: var(--ink); pointer-events:none; }
  .crosshair svg { width: 720px; height: 720px; }
</style></head>
<body>
  <div class="frame">
    <div class="top">
      <span class="pub">Thinkers Dilemma</span>
      <span class="meta">№ 014</span>
    </div>

    <div class="crosshair">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="0.5"/>
        <circle cx="50" cy="50" r="36" stroke="currentColor" stroke-width="0.5"/>
        <circle cx="50" cy="50" r="22" stroke="currentColor" stroke-width="0.5"/>
        <line x1="0" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="0.4"/>
        <line x1="50" y1="0" x2="50" y2="100" stroke="currentColor" stroke-width="0.4"/>
      </svg>
    </div>

    <div class="stage">
      <div class="kicker">
        <span class="no">A standing question</span>
        <span class="dash"></span>
        <span class="cat">Surveillance</span>
      </div>
      <div class="hl">Who<br>watches<br>the<br><em><span class="underline">watchers?</span></em></div>
      <div class="note">
        <span class="arrow">↳</span>
        <span class="text">in good faith, &amp;<br>at unhurried length.</span>
      </div>
    </div>

    <div class="botstrip">
      <div class="left">
        <div class="stamp">
          <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="3"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="currentColor" stroke-width="3"/>
            <path d="M50 4 A46 46 0 0 0 50 96 Z" fill="currentColor"/>
            <circle cx="68" cy="50" r="3.5" fill="currentColor"/>
          </svg>
        </div>
        <div class="name">
          Thinkers Dilemma
          <span class="sub">A work of inquiry</span>
        </div>
      </div>
      <div class="ep">Ep · <b>014</b></div>
    </div>
  </div>
</body></html>
