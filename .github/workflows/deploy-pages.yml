name: Deploy to GitHub Pages

# Runs on every push to main (covers manual content exports + code changes).
# The sync-rss.yml workflow also deploys after each scheduled sync run.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time — cancel older queued runs, not in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy dist/ → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
