<!doctype html><html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 32px; background: var(--paper); }
  .head { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 90px 80px 1fr; align-items: baseline; gap: 16px; padding: 8px 0; border-top: 1px solid var(--rule-soft); }
  .row:first-of-type { border-top: 1px solid var(--ink); }
  .row:last-of-type  { border-bottom: 1px solid var(--ink); }
  .tag  { font: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .size { font: var(--mono); font-size: 12px; color: var(--ink-3); font-feature-settings:"tnum"; }
  .sample { color: var(--ink); }
  .display1 { font: 400 italic 56px/1 var(--serif); letter-spacing:-0.015em; }
  .h1       { font: 500 italic 36px/1.05 var(--serif); }
  .h2       { font: 500 italic 26px/1.1  var(--serif); }
  .h3       { font: 600 19px/1.2 var(--sans); }
  .body     { font: 400 16px/1.4 var(--sans); }
  .small    { font: 400 13px/1.4 var(--sans); color: var(--ink-2); }
  .label    { font: 500 11px/1 var(--mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--signal); }
</style></head>
<body>
  <div class="head">Type scale</div>
  <div class="row"><span class="tag">Display</span><span class="size">56 / 0.95</span><span class="sample display1">Who benefits?</span></div>
  <div class="row"><span class="tag">H1</span>     <span class="size">36 / 1.05</span><span class="sample h1">The thinkers dilemma.</span></div>
  <div class="row"><span class="tag">H2</span>     <span class="size">26 / 1.10</span><span class="sample h2">A standing question.</span></div>
  <div class="row"><span class="tag">H3</span>     <span class="size">19 / 1.20</span><span class="sample h3">Section / subhead</span></div>
  <div class="row"><span class="tag">Body</span>   <span class="size">16 / 1.40</span><span class="sample body">Running text and prose.</span></div>
  <div class="row"><span class="tag">Small</span>  <span class="size">13 / 1.40</span><span class="sample small">Footnote, caption, byline.</span></div>
  <div class="row"><span class="tag">Label</span>  <span class="size">11 / 1.00</span><span class="sample label">Issue · No. 014</span></div>
</body></html>
