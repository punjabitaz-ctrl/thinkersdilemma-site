<!doctype html><html><head><meta charset="utf-8"><title>Logo — primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px 40px; background: var(--paper); }
  .row { display: flex; align-items: center; gap: 56px; }
  .mark { color: var(--ink); width: 96px; height: 96px; }
  .wordmark-block { display: flex; flex-direction: column; gap: 6px; }
  .wordmark { font: 500 italic 56px/1 var(--serif); color: var(--ink); letter-spacing: -0.01em; }
  .tag { font: var(--kicker); letter-spacing: 0.22em; color: var(--signal); text-transform: uppercase; }
  .rule { height: 1px; background: var(--ink); margin: 6px 0; }
</style></head>
<body>
  <div class="row">
    <svg class="mark" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="3"/>
      <line x1="50" y1="4" x2="50" y2="96" stroke="currentColor" stroke-width="3"/>
      <path d="M50 4 A46 46 0 0 0 50 96 Z" fill="currentColor"/>
      <circle cx="68" cy="50" r="3.5" fill="currentColor"/>
    </svg>
    <div class="wordmark-block">
      <span class="tag">A work of inquiry</span>
      <div class="rule"></div>
      <span class="wordmark">Thinkers Dilemma</span>
    </div>
  </div>
</body></html>
