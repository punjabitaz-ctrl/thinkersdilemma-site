<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: var(--paper); }
  .head { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: 60px 1fr 70px; align-items: center; gap: 16px; padding: 6px 0; }
  .name { font: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .bar  { height: 14px; background: var(--ink); }
  .val  { font: var(--mono); font-size: 12px; color: var(--ink-3); text-align: right; font-feature-settings:"tnum"; }
</style></head>
<body>
  <div class="head">Spacing scale · 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96 / 128</div>
  <div class="row"><span class="name">s-0</span><div class="bar" style="width:4px"></div>  <span class="val">4 px</span></div>
  <div class="row"><span class="name">s-1</span><div class="bar" style="width:8px"></div>  <span class="val">8 px</span></div>
  <div class="row"><span class="name">s-2</span><div class="bar" style="width:12px"></div> <span class="val">12 px</span></div>
  <div class="row"><span class="name">s-3</span><div class="bar" style="width:16px"></div> <span class="val">16 px</span></div>
  <div class="row"><span class="name">s-4</span><div class="bar" style="width:24px"></div> <span class="val">24 px</span></div>
  <div class="row"><span class="name">s-5</span><div class="bar" style="width:32px"></div> <span class="val">32 px</span></div>
  <div class="row"><span class="name">s-6</span><div class="bar" style="width:48px"></div> <span class="val">48 px</span></div>
  <div class="row"><span class="name">s-7</span><div class="bar" style="width:64px"></div> <span class="val">64 px</span></div>
  <div class="row"><span class="name">s-8</span><div class="bar" style="width:96px"></div> <span class="val">96 px</span></div>
  <div class="row"><span class="name">s-9</span><div class="bar" style="width:128px"></div><span class="val">128 px</span></div>
</body></html>
