<!doctype html><html><head><meta charset="utf-8"><title>Pull quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 36px; background: var(--paper); }
  .quote-block {
    display: grid; grid-template-columns: 28px 1fr; gap: 18px; align-items: start;
    border-top: 2px solid var(--ink); border-bottom: 1px solid var(--ink);
    padding: 18px 0;
  }
  .glyph { font: 400 italic 56px/0.8 var(--serif); color: var(--signal); }
  .q { font: 400 italic 26px/1.25 var(--serif); color: var(--ink); letter-spacing: -0.005em; max-width: 540px; }
  .attr { margin-top: 12px; display: flex; gap: 10px; align-items: center; }
  .attr .name { font: 500 13px/1 var(--sans); color: var(--ink-2); }
  .attr .dash { width: 16px; height: 1px; background: var(--ink-3); }
  .attr .meta { font: 500 11px/1 var(--mono); letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
</style></head>
<body>
  <div class="quote-block">
    <div class="glyph">“</div>
    <div>
      <div class="q">If the question is who benefits, the answer is almost never the one being asked.</div>
      <div class="attr">
        <span class="dash"></span>
        <span class="name">Issue 014 · The Watchers</span>
        <span class="dash"></span>
        <span class="meta">04 · 23 · 2026</span>
      </div>
    </div>
  </div>
</body></html>
