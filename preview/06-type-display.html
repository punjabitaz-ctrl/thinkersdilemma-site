<!doctype html><html><head><meta charset="utf-8"><title>Type — Display serif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: var(--paper); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .label { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; }
  .specimen { font: 400 italic 88px/0.95 var(--serif); color: var(--ink); letter-spacing: -0.015em; }
  .sub { display: flex; gap: 32px; margin-top: 14px; align-items: baseline; }
  .meta { font: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: 0.06em; }
</style></head>
<body>
  <div class="head">
    <span class="label">Display · Newsreader</span>
    <span class="label">The headline voice</span>
  </div>
  <div class="specimen">Who benefits?</div>
  <div class="sub">
    <span class="meta">Newsreader · Italic · 400/500/600/700 · optical 6–72</span>
    <span class="meta">Use for hooks, titles, pull-quotes</span>
  </div>
</body></html>
