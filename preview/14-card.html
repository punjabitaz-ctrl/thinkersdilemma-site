<!doctype html><html><head><meta charset="utf-8"><title>Article card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 32px; background: var(--paper); }
  .card {
    background: var(--paper-hi);
    border: 1px solid var(--rule);
    padding: 20px;
    display: grid; grid-template-columns: 1fr 200px; gap: 24px; align-items: stretch;
    box-shadow: var(--shadow-1);
  }
  .left { display: flex; flex-direction: column; gap: 10px; }
  .kicker-row { display: flex; gap: 14px; align-items: center; }
  .num { font: 500 11px/1 var(--mono); letter-spacing: 0.22em; color: var(--signal); text-transform: uppercase; }
  .cat { font: 500 11px/1 var(--mono); letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; }
  .title { font: 500 italic 28px/1.1 var(--serif); color: var(--ink); letter-spacing: -0.01em; }
  .dek   { font: 400 15px/1.5 var(--sans); color: var(--ink-2); max-width: 480px; }
  .meta  { margin-top: auto; display: flex; gap: 14px; align-items: center; padding-top: 12px; border-top: 1px solid var(--rule); }
  .meta .by { font: 500 12px/1 var(--mono); letter-spacing: 0.12em; color: var(--ink-3); text-transform: uppercase; }
  .right {
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center; padding: 18px;
    text-align: center;
  }
  .right .num-big { font: 500 64px/0.9 var(--mono); font-feature-settings: "tnum"; letter-spacing: -0.02em; }
  .right .num-cap { font: 500 10px/1 var(--mono); letter-spacing: 0.28em; margin-top: 8px; color: rgba(242,235,221,0.6); text-transform: uppercase; }
  .right .num-mark { width: 12px; height: 1px; background: var(--signal); margin: 10px auto 0; }
</style></head>
<body>
  <div class="card">
    <div class="left">
      <div class="kicker-row">
        <span class="num">№ 014</span>
        <span class="cat">Surveillance</span>
      </div>
      <div class="title">The watchers, and<br>who watches them back.</div>
      <div class="dek">A six-part inquiry into ambient surveillance — what it costs, who pays, and the quiet hands shaping consent into compliance.</div>
      <div class="meta">
        <span class="by">By — The Editor</span>
        <span class="by">·</span>
        <span class="by">9 min read</span>
      </div>
    </div>
    <div class="right">
      <div>
        <div class="num-big">014</div>
        <div class="num-mark"></div>
        <div class="num-cap">Issue</div>
      </div>
    </div>
  </div>
</body></html>
