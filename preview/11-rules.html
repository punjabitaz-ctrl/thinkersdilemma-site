<!doctype html><html><head><meta charset="utf-8"><title>Rules & Borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: var(--paper); }
  .head { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 24px; padding: 10px 0; }
  .name { font: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .desc { display: flex; align-items: center; gap: 16px; font: 400 13px/1 var(--sans); color: var(--ink-2); }
  .h-hair  { flex: 1; height: 1px; background: var(--rule); }
  .h-soft  { flex: 1; height: 1px; background: var(--rule-soft); }
  .h-rule  { flex: 1; height: 1px; background: var(--ink); }
  .h-heavy { flex: 1; height: 2px; background: var(--ink); }
  .h-double{ flex: 1; height: 6px; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
  .h-red   { flex: 1; height: 2px; background: var(--signal); }
</style></head>
<body>
  <div class="head">Rules & dividers · the bones of the page</div>
  <div class="row"><span class="name">hairline</span><div class="desc"><div class="h-hair"></div><span>1 px · rule</span></div></div>
  <div class="row"><span class="name">soft</span><div class="desc"><div class="h-soft"></div><span>1 px · rule-soft</span></div></div>
  <div class="row"><span class="name">rule</span><div class="desc"><div class="h-rule"></div><span>1 px · ink</span></div></div>
  <div class="row"><span class="name">heavy</span><div class="desc"><div class="h-heavy"></div><span>2 px · ink</span></div></div>
  <div class="row"><span class="name">double</span><div class="desc"><div class="h-double"></div><span>masthead, section breaks</span></div></div>
  <div class="row"><span class="name">signal</span><div class="desc"><div class="h-red"></div><span>2 px · signal · sparingly</span></div></div>
</body></html>
