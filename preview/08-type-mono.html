<!doctype html><html><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: var(--paper); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .label { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .cell { display: flex; flex-direction: column; gap: 8px; }
  .kicker-line { font: 500 11px/1 var(--mono); letter-spacing: 0.22em; color: var(--signal); text-transform: uppercase; }
  .numerals { font: 500 28px/1 var(--mono); color: var(--ink); letter-spacing: 0.04em; font-feature-settings: "tnum","lnum"; }
  .meta { font: 400 12px/1.4 var(--mono); color: var(--ink-3); letter-spacing: 0.06em; }
  .stamp { font: 500 11px/1 var(--mono); letter-spacing: 0.18em; color: var(--ink-2); text-transform: uppercase; }
</style></head>
<body>
  <div class="head">
    <span class="label">Mono · IBM Plex Mono</span>
    <span class="label">The label voice</span>
  </div>
  <div class="grid">
    <div class="cell">
      <span class="kicker-line">Issue № 014 · The watchers</span>
      <span class="numerals">04 · 23 · 2026</span>
      <span class="meta">Tabular figures · 9'42" runtime · 3,412 words</span>
    </div>
    <div class="cell">
      <span class="stamp">Filed under — Surveillance</span>
      <span class="stamp">Tags — Tech · Power · Drift</span>
      <span class="stamp">By — The Editor</span>
    </div>
  </div>
</body></html>
