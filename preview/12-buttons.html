<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: var(--paper); }
  .head { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .row + .row { margin-top: 14px; }

  .btn {
    font: 500 14px/1 var(--sans);
    letter-spacing: 0.02em;
    padding: 12px 20px;
    border: 1px solid var(--ink);
    border-radius: 2px;
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease);
  }
  .btn:hover { transform: translateY(-1px); }

  .btn-ghost { background: transparent; color: var(--ink); }
  .btn-signal { background: var(--signal); border-color: var(--signal); color: #fff; }
  .btn-signal-ghost { background: transparent; border-color: var(--signal); color: var(--signal); }

  .btn-arrow::after { content: " →"; }

  .pill {
    font: var(--kicker); letter-spacing: 0.22em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px; border: 1px solid var(--ink);
    color: var(--ink); background: transparent;
  }
  .pill-signal { color: #fff; background: var(--signal); border-color: var(--signal); }
  .pill-quiet  { color: var(--signal-deep); background: var(--signal-tint); border-color: var(--signal-tint); }
</style></head>
<body>
  <div class="head">Buttons · square corners, ink first, signal sparingly</div>
  <div class="row">
    <button class="btn">Read the essay</button>
    <button class="btn btn-arrow">Subscribe</button>
    <button class="btn btn-ghost">Listen</button>
    <button class="btn btn-signal">New issue</button>
    <button class="btn btn-signal-ghost btn-arrow">Watch</button>
  </div>
  <div class="row">
    <span class="pill">Surveillance</span>
    <span class="pill pill-signal">Just out</span>
    <span class="pill pill-quiet">Reading</span>
  </div>
</body></html>
