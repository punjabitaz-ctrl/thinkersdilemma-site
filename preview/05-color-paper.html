<!doctype html><html><head><meta charset="utf-8"><title>Color — Paper</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: var(--paper); }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .title { font: 500 italic 28px/1 var(--serif); color: var(--ink); }
  .kicker { font: var(--kicker); letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { aspect-ratio: 16/11; border-radius: 2px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; color: var(--ink); border: 1px solid var(--rule); }
  .swatch .name { font: var(--label); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
  .swatch .hex  { font: var(--numeral); font-size: 13px; font-feature-settings: "tnum"; }
  .s1 { background: var(--paper-hi); }
  .s2 { background: var(--paper); }
  .s3 { background: var(--paper-lo); }
  .s4 { background: var(--paper-deep); }
</style></head>
<body>
  <div class="header">
    <div class="title">Paper — Surfaces</div>
    <span class="kicker">Warm cream · archival, never bright white</span>
  </div>
  <div class="row">
    <div class="swatch s1"><span class="name">Paper-Hi</span><span class="hex">#F8F4EA</span></div>
    <div class="swatch s2"><span class="name">Paper</span><span class="hex">#F2EBDD</span></div>
    <div class="swatch s3"><span class="name">Paper-Lo</span><span class="hex">#E8DFC9</span></div>
    <div class="swatch s4"><span class="name">Deep</span><span class="hex">#DCD1B6</span></div>
  </div>
</body></html>
